kind = "web"
previewPath = "/"
title = "Estheva Studio"
version = "1.0.0"
id = "artifacts/estheva-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25728

[services.development]
run = "pnpm --filter @workspace/estheva-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/estheva-studio", "run", "build" ]
publicDir = "artifacts/estheva-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25728"
BASE_PATH = "/"
